# Profil bilan chasse
schema_version: 2
id: chasse
label: "Bilan chasse"
out_subdir: bilan_chasse

filter:
  type: chasse
  keywords: ["chasse", "police de la chasse"]
  columns: [theme, type_actio]

# PVe : uniquement NATINF chasse (20148, 20155, 20165, 20166 = pêche en eau douce → exclus)
natinf_pve: ["26274", "26301", "27745", "2002"]
natinf_pej: ["29821", "29844", "29845", "26307", "323", "11975", "26305", "2172", "5984", "11889", "28969", "26303", "27741"]

analyse_PVe: true

sources:
  point_ctrl: true
  pej: true
  pa: false
  pve: true

periode_analyse:
  ventilation:
    type: auto
    seuil_jours: 366

options:
  pnf:
    label: "Analyse PNF / hors PNF"
    default: false
    ask: false
  tub:
    label: "Analyse zones TUB"
    default: false
    ask: false
  cartes:
    label: "Intégration des cartes"
    default: true
    ask: false
  par_commune:
    label: "Indicateurs par commune"
    default: true
    ask: false
