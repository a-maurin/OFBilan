schema_version: 2
pipeline: thematic
presentation_scope: thematique
aggregation:
  adapter: run_profile_aggregations
pdf:
  adapter: generate_profile_pdf_report
capabilities:
  combine: true
  mix_batch: true
cartes:
  extra_texts:
    texte_bandeau_haut: "{nom_bilan} — {periode_formatee}"
    texte_bandeau_bas: "Sources : OFB/OSCEAN – MININT/AGC – OpenStreetMap\nRéalisation : OFB SD{departement} – {date_fin} | Projection : RGF93 / Lambert-93 (EPSG:2154)"
options:
  pnf:
    label: Analyse PNF (cœur / hors-cœur et zonage parc)
    default: false
    ask: true
