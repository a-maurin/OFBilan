id: global
label: Bilan global
title_label: Bilan global
pipeline: global
presentation_scope: global
out_subdir: bilan_global
output_filename: bilan_global.pdf
capabilities:
  combine: false
  mix_batch: false
  map_profiles: []

cartographie:
  catalog:
    - id: global_domaines
      label: "Domaines"
      fichier: carte_global_domaines.png
    - id: global_resultats
      label: "Contrôles"
      fichier: carte_global_resultats.png
    - id: global_usagers
      label: "Types d'usagers"
      fichier: carte_global_usagers.png
    - id: global_procedures
      label: "Procédures"
      fichier: carte_global_procedures.png
aggregation:
  adapter: run_profile_aggregations
pdf:
  adapter: generate_profile_pdf_report
periode_analyse:
  ventilation:
    type: auto
    seuil_jours: 0
analyse_PVe: true
analyses:
  type_usager: true
  distinction_coeur_hors_coeur: false

options:
  cartes:
    label: "Intégration des cartes"
    default: true
    ask: false
  cartes_selection:
    label: "Cartes à intégrer au PDF"
    type: multi_choice
    default:
      - global_domaines
      - global_resultats
      - global_usagers
      - global_procedures
    ask: true
