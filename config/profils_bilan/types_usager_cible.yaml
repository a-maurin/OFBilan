schema_version: 2
id: types_usager_cible
label: Bilan types d'usagers – ciblé
# Présentation PDF : config/presentation/pdf_presentation.yaml → profiles.types_usager_cible
# (section 4 = pression de contrôle tous types ; procédures par domaine/thème en sec. 3).
out_subdir: bilan_types_usager_cible
filter:
  type: type_usager
  type_usager_target: []
analyse_PVe: false
sources:
  point_ctrl: true
  pej: true
  pa: true
  pve: false
periode_analyse:
  ventilation:
    type: auto
    seuil_jours: 366
analyses:
  type_usager: true
# Deux cartes externes (même page, côte à côte) : data/out/generateur_de_cartes/
#   carte_{map_id}.png  et  carte_{map_id}_2.png  (map_id = code court du type, ex. AGR)
# disposition: verticale  pour les empiler sur la page
cartographie:
  fichiers:
    - carte_{map_id}.png
    - carte_{map_id}_2.png
  disposition: verticale
options:
  cartes:
    label: Intégration des cartes
    default: true
    ask: true
