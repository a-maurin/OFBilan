schema_version: 1

# Configuration du glossaire utilisé dans les bilans PDF.
# L'utilisateur peut compléter cette liste à volonté.
#
# Chaque entrée :
# - id         : identifiant unique de l’abréviation (clé utilisée par le code)
# - label      : texte affiché dans la colonne "Abréviation"
# - definition : texte affiché dans la colonne "Signification"

header:
  abbr_label: "Abréviation"
  definition_label: "Signification"

abbreviations:
  - id: DC
    label: "DC"
    definition: "Numéro de dossier OSCEAN"

  - id: NATINF
    label: "NATINF"
    definition: "Nature d'infraction (nomenclature nationale)"

  - id: OSCEAN
    label: "OSCEAN"
    definition: "Outil pour la Surveillance et le Contrôle Eau et Nature"

  - id: PA
    label: "PA"
    definition: "Procédure administrative"

  - id: PEJ
    label: "PEJ"
    definition: "Procédure d'enquête judiciaire"

  - id: PNF
    label: "PNF"
    definition: "Parc national de forêts"

  - id: PVe
    label: "PVe"
    definition: "Procès-verbal électronique"

  - id: TUB
    label: "TUB"
    definition: "Zone définie par l'arrêté préfectoral « Tuberculose bovine »"
