version: 1

# -----------------------------------------------------------------------------
# Documentation rapide
# -----------------------------------------------------------------------------
# Résolution de la config:
# 1) defaults
# 2) scopes.<global|thematique>
# 3) profiles.<id_profil> (si scope compatible)
#
# behavior.missing_data_policy:
# - hide_silently   -> n'affiche pas les messages "Aucune donnée..."
# - show_placeholder -> affiche ces messages
#
# sections:
# - order   : ordre souhaité des sections du PDF
# - enabled : activation/désactivation d'une section
#
# blocks:
# - activation fine des sous-blocs (tableaux, graphiques, cartes, etc.)
# - supporte des clés imbriquées (ex: sec22res.show_pie)
# -----------------------------------------------------------------------------

behavior:
  missing_data_policy: show_placeholder
  unknown_block_policy: ignore

defaults:
  title:
    model: three_lines
    line1: "Bilan des activités de police administrative et judiciaire"
    line2_mode: profile_label   # profile_label | fixed | none
    line2_fixed: ""
    line3_mode: department      # department | fixed
    line3_fixed: ""
    typography:
      normalize_department_name: true
      apostrophe_style: typographic

  title_page:
    alignment: right
    right_indent_mm: 25
    paragraph_space_after: 8
    main_title_font_size: 24
    profile_department_font_size: 20
    meta_font_size: 12
    top_spacer_ratio: 0.30
    meta_block_space_before: 12
    meta_block_space_between: 8
    # Sous-titre de page de garde (pilotage YAML, sans logique codée locale).
    # - none: pas de sous-titre
    # - fixed: texte fixe via subtitle_fixed
    # - sources_auto: "Sources..." + suffixe optionnel si nb_pve > 0
    subtitle_mode: none
    subtitle_fixed: ""
    subtitle_sources_base: "Sources des données : OFB/OSCEAN"
    subtitle_sources_pve_suffix: " – MININT/AGC-PVe"

  sections:
    order: ["sec1", "sec2", "sec3", "sec4", "sec5", "sec6"]
    enabled: {}
    # Surcharge optionnelle des libellés de sections par identifiant.
    # Exemple:
    # titles:
    #   sec1: "1. Chiffres-clés"
    titles: {}

  notice_methodology:
    title: "Notice méthodologique"
    data_source_paragraph: >
      Les données relatives aux contrôles et aux procédures présentées dans ce document
      sont extraites de la base du logiciel OSCEAN, outil de rapportage des activités
      de police administrative et judiciaire des agents de l'OFB.
    unit_measure_paragraph: >
      Sauf mention contraire, l'unité de mesure du nombre de contrôles utilisée dans
      la suite du document est la localisation de contrôle : une unité correspond à
      une localisation renseignée.
    pa_pj_distinction_paragraph: >
      Il convient de distinguer l'activité de police administrative et l'activité de
      police judiciaire. Dans ce document, le terme « contrôle » renvoie exclusivement
      à la police administrative. Le terme « procédure judiciaire » désigne l'activité
      de police judiciaire, qui ne se limite pas aux infractions relevées lors des
      contrôles et peut aussi inclure des saisines extérieures (instruction parquet,
      signalements, plaintes, etc.).
    multi_usager_paragraph: >
      Le total des contrôles par type d'usager peut être supérieur au total des
      contrôles, car une même fiche de contrôle peut renseigner plusieurs types
      d'usagers (contrôle multi-usager). L'analyse par type d'usager comptabilise
      chaque type renseigné afin de refléter au mieux les usagers effectivement
      concernés par l'action de contrôle.

  sec6_methodology:
    line_period: "<b>Période d'analyse :</b> {period_str}."
    line_scope: "<b>Périmètre :</b> département {dept_name} ({dept_code})."
    line_profile: "<b>Profil :</b> {profile_label}."
    line_sources: "<b>Sources :</b> {sources_text}."
    line_ventilation: "<b>Ventilation temporelle :</b> {ventilation_mode} (seuil {ventilation_threshold_days} jours en mode auto)."
    line_filters: "Aucun filtre sur domaine ou thème ; tous NATINF pour PEJ et PVe."
    line_types_usagers: "<b>Types d’usagers :</b> issus du champ OSCEAN <i>type_usager</i> des points de contrôle ; catégorie « dominante » par contrôle via le mapping ref/types_usagers.csv."
    zone_line_pnf_only: "<b>Analyse par zones :</b> bilan restreint au périmètre du PNF ; la lecture spatiale distingue le coeur de parc de l'aire d'adhésion hors coeur de parc."
    zone_line_pnf_and_tub: "<b>Analyse par zones :</b> la zone « Département » inclut l'ensemble des contrôles, puis les zones PNF et TUB sont détaillées séparément."
    zone_line_pnf_only_department: "<b>Analyse par zones :</b> la zone « Département » inclut l'ensemble des contrôles, puis la zone PNF est détaillée séparément."
    zone_line_tub_only: "<b>Analyse par zones :</b> la zone « Département » inclut l'ensemble des contrôles, puis la zone TUB est détaillée séparément."

  blocks:
    sec21:
      show_table: true
      show_chart_controles: true
      show_chart_procedures: true
      show_chart_taux_line: true
    sec22:
      show_intro_text: true
      show_table: true
      show_pie: true
    sec22dom:
      show_pie: true
      show_overflow_note: true
    sec22res:
      show_table: true
      show_pie: true
    sec31:
      show_table: true
      show_key_figures: true
      show_top_infractions: true
      show_detail_table: true
      show_natinf_analysis: true
      show_zone_table: true
    sec32:
      show_table: true
      show_key_figures: true
      show_top_infractions: true
      show_theme_table: true
      show_detail_table: true
      show_natinf_analysis: true
      show_zone_table: true
      show_cloture_table: true
      show_suite_table: true
    sec33:
      show_table: true
      show_key_figures: true
      show_detail_table: true
    sec4:
      show_intro_text: true
      show_key_figures: true
      show_table_usagers: true
      show_pie_usagers: true
      show_table_usagers_x_domaine: true
      show_resultats_par_type_usager_chart: true
      show_resultats_par_type_usager_table: true
    sec5:
      show_map: true
      show_map_fallback_message: true
    sec6:
      show_methodology: true
      show_glossary: true

scopes:
  global:
    title:
      line2_mode: none
    title_page:
      subtitle_mode: none
    sections:
      order: ["sec1", "sec2_chap", "sec21", "sec22dom", "sec22theme", "sec22res", "sec3", "sec31", "sec32", "sec33", "sec4", "sec5map", "sec6"]

  thematique:
    title:
      line2_mode: profile_label
    title_page:
      subtitle_mode: sources_auto
    sections:
      order: ["sec1", "sec2", "sec21", "sec22", "sec3", "sec31", "sec32", "sec33", "sec4", "sec5", "sec6"]

profiles:
  # Exemple: profil thématique PNF
  pnf:
    scope: thematique
    blocks:
      sec5:
        show_map: true

  # Exemple: profil avec PDF plus compact
  compact:
    blocks:
      sec21:
        show_chart_procedures: false
        show_chart_taux_line: false
      sec4:
        show_pie_usagers: false
        show_resultats_par_type_usager_chart: false

feature_registry:
  sec21: both
  sec22: thematique
  sec22dom: global
  sec22theme: global
  sec22res: global
  sec31: both
  sec32: both
  sec33: both
  sec4: both
  sec5: thematique
  sec5map: global
  sec6: both
