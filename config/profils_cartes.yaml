      categories:
        "Agriculteur": "#F1C40F"        # Jaune
        "Collectivité": "#3498DB"       # Bleu
        "Particulier": "#E67E22"        # Orange
        "Entreprise": "#2ECC71"         # Vert
        "Acteurs sylvicoles": "#9B59B6" # Violet
        "Autre": "#95A5A6"              # Gris

