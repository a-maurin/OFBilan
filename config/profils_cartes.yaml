global_usagers:
  title: "Bilan global SD21 — Contrôles par types d’usagers — Côte-d'Or"
  layout_name: "Bilan 2025 / 2026 - Agrainage illicite - Côte d'Or"
  output_filename: "carte_global_usagers.png"
  date_deb: "2025-01-01"
  date_fin: "2026-02-05"
  title_main: "Contrôles — types d’usagers — Côte-d'Or"
  subtitle: ""
  layout_title_item_id: "titre_principal"
  layout_subtitle_item_id: "sous_titre"
  layers:
    pochoir_sd21:
      layer_name: "pochoir_sd21"
      legend_label: "Périmètre SD21"
      geometry_mode: "polygon_fill"
      renderer_type: "graduated"
      palette: "Blues"
    point_ctrl_20260205_wgs84:
      layer_name: "point_ctrl_20260205_wgs84"
      legend_label: "Contrôles (types d’usagers)"
      filter_type: "point_ctrl_global"
      geometry_mode: "polygon_fill"
      renderer_type: "categorized"
      field: "CASE\n  WHEN attribute(@feature, 'type_usager') ILIKE '%Particulier%' THEN 'Particulier'\n  WHEN attribute(@feature, 'type_usager') ILIKE '%Agriculteur%' THEN 'Agriculteur'\n  WHEN attribute(@feature, 'type_usager') ILIKE '%Collectiv%' THEN 'Collectivité'\n  WHEN attribute(@feature, 'type_usager') ILIKE '%Entreprise%' THEN 'Entreprise'\n  WHEN attribute(@feature, 'type_usager') ILIKE '%sylvic%' THEN 'Acteurs sylvicoles'\n  WHEN attribute(@feature, 'type_usager') ILIKE '%Autre%' THEN 'Autre'\n  ELSE 'Autre'\nEND\n"
      palette: "#003A76,#53AB60,#F4A261,#E76F51,#90BF83,#4296CE"

