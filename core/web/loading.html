<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OFBilan - Chargement...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #003A76; /* Couleur primaire OFB */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }
        .logo-container {
            margin-bottom: 30px;
        }
        .logo {
            width: 150px;
            height: auto;
            /* Animation de pulsation */
            animation: pulse 2s infinite ease-in-out;
            /* Filtre blanc pour s'assurer qu'il ressort sur le fond bleu s'il ne l'est pas déjà */
            filter: brightness(0) invert(1);
        }
        .loading-text {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 20px;
        }
        .spinner {
            margin: 20px auto 0;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <!-- Inclusion du logo local -->
            <img src="logo.svg" alt="OFBilan Logo" class="logo" onerror="this.style.display='none'">
        </div>
        <div class="loading-text">DÉMARRAGE DU SERVEUR</div>
        <div class="spinner"></div>
    </div>

    <script>
        const targetUrl = 'http://localhost:8000/explorer.html';
        const pingUrl = 'http://localhost:8000/favicon.ico';
        let retries = 0;
        const maxRetries = 60; // 30 secondes (60 * 500ms)

        function checkServer() {
            // Mode 'no-cors' pour éviter les erreurs CORS depuis un fichier file://
            // Si le serveur est mort, fetch lève une exception TypeError (NetworkError).
            // S'il est en vie, il renverra une réponse opaque.
            fetch(pingUrl, { mode: 'no-cors' })
                .then(() => {
                    // Le serveur a répondu (même avec une erreur 404, au niveau TCP c'est OK)
                    // On attend un tout petit peu que l'app se stabilise
                    setTimeout(() => {
                        window.location.replace(targetUrl);
                    }, 500);
                })
                .catch((error) => {
                    // Erreur réseau (serveur pas encore lancé)
                    retries++;
                    if (retries < maxRetries) {
                        setTimeout(checkServer, 500);
                    } else {
                        document.querySelector('.loading-text').innerText = "ERREUR DE DÉMARRAGE";
                        document.querySelector('.loading-text').style.color = "#D95C4A";
                        document.querySelector('.spinner').style.display = 'none';
                    }
                });
        }

        // On lance la vérification après un court délai pour laisser QGIS lancer le process
        setTimeout(checkServer, 1000);
    </script>
</body>
</html>
