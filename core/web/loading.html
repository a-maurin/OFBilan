<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OFBilan - Chargement...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #003A76; /* Couleur primaire OFB */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }
        .logo-container {
            margin-bottom: 30px;
        }
        .logo {
            width: 750px;
            height: auto;
        }
        .loading-text {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 20px;
        }
        .spinner {
            margin: 20px auto 0;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .logs-container {
            margin-top: 30px;
            width: 80%;
            max-width: 600px;
            height: 150px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            font-family: monospace;
            font-size: 0.9rem;
            color: #d1d5db;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <!-- Inclusion du logo local -->
            <img src="logo.svg" alt="OFBilan Logo" class="logo" onerror="this.style.display='none'">
        </div>
        <div class="loading-text">DÉMARRAGE DU SERVEUR</div>
        <div class="spinner"></div>
        <div class="logs-container" id="logs">Initialisation...</div>
    </div>

    <script>
        const targetUrl = 'http://localhost:8000/explorer.html';
        const statusUrl = 'http://localhost:8000/api/preload-status';
        let retries = 0;
        const maxRetries = 120; // 60 secondes (120 * 500ms)

        function checkServer() {
            fetch(statusUrl)
                .then(response => response.json())
                .then(data => {
                    const logsDiv = document.getElementById('logs');
                    if (data.logs && data.logs.length > 0) {
                        logsDiv.innerHTML = data.logs.join('<br>');
                        logsDiv.scrollTop = logsDiv.scrollHeight;
                    }
                    
                    if (data.status === 'ready') {
                        document.querySelector('.loading-text').innerText = "PRÊT !";
                        setTimeout(() => {
                            window.location.replace(targetUrl);
                        }, 500);
                    } else {
                        setTimeout(checkServer, 500);
                    }
                })
                .catch((error) => {
                    retries++;
                    if (retries < maxRetries) {
                        setTimeout(checkServer, 500);
                    } else {
                        document.querySelector('.loading-text').innerText = "ERREUR DE DÉMARRAGE";
                        document.querySelector('.loading-text').style.color = "#D95C4A";
                        document.querySelector('.spinner').style.display = 'none';
                    }
                });
        }

        // On lance la vérification après un court délai pour laisser QGIS lancer le process
        setTimeout(checkServer, 1000);
    </script>
</body>
</html>
