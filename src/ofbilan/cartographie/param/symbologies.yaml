# Symbologies nommées pour les couches cartographiques.
# Référence depuis profils_cartes.yaml via symbology_ref sur une couche.
# Clés : nom de la symbologie. Valeurs : paramètres équivalents à LayerSymbologyConfig.

default_polygon:
  geometry_mode: polygon_fill
  renderer_type: graduated
  field: ""
  classification_mode: quantile
  num_classes: 5
  palette: Blues
  symbol_size_mm: 2.0
  symbol_shape: circle
  visible: true

points_agrainage:
  filter_type: point_ctrl_agrainage
  renderer_type: single
  palette: "#C0392B"
  symbol_size_mm: 1.9
  symbol_shape: circle
  visible: true

points_chasse:
  filter_type: point_ctrl_chasse
  renderer_type: single
  palette: "#2C3E50"
  symbol_size_mm: 1.9
  symbol_shape: circle
  visible: true

points_piegeage:
  filter_type: point_ctrl_piegeage
  renderer_type: single
  palette: "#8E44AD"
  symbol_size_mm: 1.9
  symbol_shape: circle
  visible: true

points_global:
  filter_type: point_ctrl_global
  renderer_type: single
  palette: "#003A76"
  symbol_size_mm: 1.9
  symbol_shape: circle
  visible: true

# Carte "Résultats des contrôles" : une couleur par résultat
points_global_resultats:
  legend_label: "Résultats des contrôles"
  filter_type: point_ctrl_global
  renderer_type: categorized
  field: >
    CASE
      WHEN lower("resultat") LIKE '%infraction%' AND lower("resultat") NOT LIKE '%manquement%' THEN 'Infraction'
      WHEN lower("resultat") LIKE '%manquement%' AND lower("resultat") NOT LIKE '%infraction%' THEN 'Manquement'
      WHEN lower("resultat") LIKE '%manquement%' AND lower("resultat") LIKE '%infraction%' THEN 'Infraction et manquement'
      WHEN lower("resultat") LIKE '%conforme%' THEN 'Conforme'
      ELSE 'Autre'
    END
  # Vert=Conforme, Rouge=Infraction, Violet=Manquement, Orange=Infraction+Manquement, Gris=Autre
  categories:
    "Infraction": "#E74C3C"
    "Manquement": "#9B59B6"
    "Infraction et manquement": "#E67E22"
    "Conforme": "#2ECC71"
    "Autre": "#95A5A6"
  symbol_size_mm: 1.9
  symbol_shape: circle
  visible: true

# Carte "Types usagers" : une couleur par type d'usager (jaune = agriculteurs)
points_global_usagers:
  legend_label: "Types d'usagers"
  filter_type: point_ctrl_global
  renderer_type: categorized
  field: >
    CASE
      WHEN "type_usager" ILIKE '%Particulier%' THEN 'Particulier'
      WHEN "type_usager" ILIKE '%Agriculteur%' THEN 'Agriculteur'
      WHEN "type_usager" ILIKE '%Collectiv%' THEN 'Collectivité'
      WHEN "type_usager" ILIKE '%Entreprise%' THEN 'Entreprise'
      WHEN "type_usager" ILIKE '%sylvic%' THEN 'Acteur sylvicole'
      ELSE 'Autre'
    END
  # Jaune=Agriculteur, Bleu foncé=Particulier, etc.
  categories:
    "Agriculteur": "#F1C40F"
    "Particulier": "#2980B9"
    "Collectivité": "#27AE60"
    "Entreprise": "#E74C3C"
    "Acteur sylvicole": "#16A085"
    "Autre": "#95A5A6"
  symbol_size_mm: 1.9
  symbol_shape: circle
  visible: true

# Carte "Domaines de contrôle" : une couleur par domaine
points_global_domaines:
  legend_label: "Domaines de contrôle"
  filter_type: point_ctrl_global
  renderer_type: categorized
  field: 'coalesce("domaine", ''Hors domaine'')'
  # Palette multi-couleurs distinctives, assignées cycliquement par domaine rencontré
  palette: "#003A76,#E74C3C,#F1C40F,#27AE60,#8E44AD,#E67E22,#16A085,#2C3E50,#C0392B,#1ABC9C"
  symbol_size_mm: 1.9
  symbol_shape: circle
  visible: true

