# Symbologies nommées pour les couches cartographiques.
# Référence depuis profils_cartes.yaml via symbology_ref sur une couche.
# Clés : nom de la symbologie. Valeurs : paramètres équivalents à LayerSymbologyConfig.

default_polygon:
  geometry_mode: polygon_fill
  renderer_type: graduated
  field: ""
  classification_mode: quantile
  num_classes: 5
  palette: Blues
  symbol_size_mm: 4.0
  symbol_shape: circle
  visible: true

points_agrainage:
  legend_label: Contrôles agrainage
  filter_type: point_ctrl_agrainage
  geometry_mode: polygon_fill
  renderer_type: graduated
  field: ""
  classification_mode: quantile
  num_classes: 5
  palette: Blues
  symbol_size_mm: 4.0
  symbol_shape: circle
  visible: true

points_chasse:
  legend_label: Contrôles chasse
  filter_type: point_ctrl_chasse
  geometry_mode: polygon_fill
  renderer_type: graduated
  field: ""
  classification_mode: quantile
  num_classes: 5
  palette: Blues
  symbol_size_mm: 4.0
  symbol_shape: circle
  visible: true

points_piegeage:
  legend_label: Contrôles piégeage
  filter_type: point_ctrl_piegeage
  geometry_mode: polygon_fill
  renderer_type: graduated
  field: ""
  classification_mode: quantile
  num_classes: 5
  palette: Oranges
  symbol_size_mm: 4.0
  symbol_shape: circle
  visible: true

points_global_usagers:
  legend_label: Contrôles (types d’usagers)
  filter_type: point_ctrl_global
  renderer_type: categorized
  # Expression QGIS pour regrouper les valeurs du champ OSCEAN type_usager en 6 catégories
  field: >
    CASE
      WHEN "type_usager" ILIKE '%Particulier%' THEN 'Particulier (usager de la nature + gestionnaire d''une propriété)'
      WHEN "type_usager" ILIKE '%Agriculteur%' THEN 'Agriculteur et autres acteurs agricoles'
      WHEN "type_usager" ILIKE '%Collectiv%' THEN 'Collectivité'
      WHEN "type_usager" ILIKE '%Entreprise%' THEN 'Entreprise'
      WHEN "type_usager" ILIKE '%sylvic%' THEN 'Acteurs sylvicoles'
      WHEN "type_usager" ILIKE '%Autre%' THEN 'Autre'
      ELSE 'Autre'
    END
  # Couleurs (hex) par catégorie — réutilisées cycliquement si besoin
  palette: "#003A76,#53AB60,#F4A261,#E76F51,#90BF83,#4296CE"
  symbol_size_mm: 3.8
  symbol_shape: circle
  visible: true

points_usagers_agriculteurs:
  legend_label: "Contrôles agriculteurs"
  filter_type: point_ctrl_global
  renderer_type: categorized
  # Expression QGIS restreinte aux agriculteurs et autres acteurs agricoles
  field: >
    CASE
      WHEN "type_usager" ILIKE '%Agriculteur%' THEN 'Agriculteur et autres acteurs agricoles'
      ELSE NULL
    END
  palette: "#53AB60"
  symbol_size_mm: 3.8
  symbol_shape: circle
  visible: true

points_usagers_cibles:
  legend_label: "Contrôles (types d’usagers ciblés)"
  filter_type: point_ctrl_global
  renderer_type: categorized
  # Expression QGIS identique à points_global_usagers (répartition en 6 catégories)
  field: >
    CASE
      WHEN "type_usager" ILIKE '%Particulier%' THEN 'Particulier (usager de la nature + gestionnaire d''une propriété)'
      WHEN "type_usager" ILIKE '%Agriculteur%' THEN 'Agriculteur et autres acteurs agricoles'
      WHEN "type_usager" ILIKE '%Collectiv%' THEN 'Collectivité'
      WHEN "type_usager" ILIKE '%Entreprise%' THEN 'Entreprise'
      WHEN "type_usager" ILIKE '%sylvic%' THEN 'Acteurs sylvicoles'
      WHEN "type_usager" ILIKE '%Autre%' THEN 'Autre'
      ELSE 'Autre'
    END
  palette: "#003A76,#53AB60,#F4A261,#E76F51,#90BF83,#4296CE"
  symbol_size_mm: 3.8
  symbol_shape: circle
  visible: true

