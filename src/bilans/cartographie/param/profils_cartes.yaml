# Profils de cartes : configuration socle commun (les surcharges se font dans les YAML de profils)
symbology_source: yaml
layers_from_layout: false

default:
  cartes_actives: ['domaines', 'usagers', 'resultats', 'procedures']
  pochoir: departement
  couches_vecteurs_extra: []

  cartes_definitions:
    domaines:
      suffixe_nom: "_domaines"
      title_main: "Contrôles par domaine"
      layers:
        pochoir:
          layer_role: pochoir
          symbology_ref: pochoir
        point_controles:
          layer_role: point_controles
          symbology_ref: points_domaines

    usagers:
      suffixe_nom: "_usagers"
      title_main: "Contrôles par type d'usager"
      layers:
        pochoir:
          layer_role: pochoir
          symbology_ref: pochoir
        point_controles:
          layer_role: point_controles
          symbology_ref: points_usagers

    resultats:
      suffixe_nom: "_resultats"
      title_main: "Résultats des contrôles"
      layers:
        pochoir:
          layer_role: pochoir
          symbology_ref: pochoir
        point_controles:
          layer_role: point_controles
          symbology_ref: points_resultats

    procedures:
      suffixe_nom: "_procedures"
      title_main: "Procédures et PVe"
      layers:
        pochoir:
          layer_role: pochoir
          symbology_ref: pochoir
        pej:
          layer_role: pej
          symbology_ref: points_pej
        pve:
          layer_role: pve
          symbology_ref: points_pve
