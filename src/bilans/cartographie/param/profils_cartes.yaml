# Profils de cartes : types de cartes et couches à afficher.
# Si ce fichier existe, il est chargé en priorité sur config_cartes.py (rétrocompatibilité).
#
# symbology_source (global, défaut qgis) :
#   qgis  — conserver symbologies et règles du projet bilans_carte.qgz (recommandé)
#   yaml  — écraser via param/symbologies.yaml (mode legacy)
#
# layer_role : résolution dynamique si layer_name absent ou renommé dans QGIS
#   (point_controles, pej, pochoir, zone_interdiction_agrainage, …)
#
# layers_from_layout (global, défaut true) :
#   true  — couches découvertes depuis le layout QGIS ; section layers = surcharges (filtres, légende)
#   false — liste explicite layers (mode legacy)

symbology_source: yaml
layers_from_layout: false

profiles:
  agrainage:
    id: agrainage
    title: "Bilan agrainage 2025-2026 — Agrainage illicite (NATINF 27742 et 25001) — Côte-d'Or"
    layout_name: "Bilan 2025 / 2026 - Agrainage illicite - Côte d'Or"
    layout_defaults_ref: carre_210
    layout_layer_group: agrainage
    output_filename: carte_agrainage.png
    date_deb: "2025-01-01"
    date_fin: "2026-02-05"
    title_main: ""
    subtitle: ""
    layout_title_item_id: titre_principal
    layout_subtitle_item_id: sous_titre
    layers:
      "Zone d'interdiction d'agrainage":
        layer_role: zone_interdiction_agrainage
        symbology_ref: default_polygon
        layer_name: "Zone d'interdiction d'agrainage"
